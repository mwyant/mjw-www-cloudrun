name: Build and Deploy to Cloud Run

on:
  push:
    tags:
      - 'main'

env:
  PROJECT_ID: mikewyantjr-dev
  SERVICE: mikewyantjr-www
  REGION: us-east1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Docker auth'
        run: |-
          gcloud auth configure-docker us-east1-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |-
          docker build -t us-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/website/${{ env.SERVICE }}:${{ github.sha }} .
          docker push us-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/website/${{ env.SERVICE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |-
          gcloud run deploy ${{ env.SERVICE }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --image us-east1-docker.pkg.dev/${{ env.PROJECT_ID }}/website/${{ env.SERVICE }}:${{ github.sha }} \
            --allow-unauthenticated \
            --port 8080

      - name: Verify Deployment
        run: |-
          URL=$(gcloud run services describe ${{ env.SERVICE }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
          echo "Deployed to: $URL"
          curl -f "$URL/"
          curl -f "$URL/ping"
