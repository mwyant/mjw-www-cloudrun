<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VOID LANCER // FIRST SORTIE</title>
  
  <!-- Modern UI Dependencies -->
  <link rel="stylesheet" href="../css/modern.css">
  
  <style>
    :root {
      --clr-arcade-bg: #050812;
      --clr-arcade-panel: rgba(11, 23, 48, 0.95);
      --clr-arcade-border: rgba(0, 229, 255, 0.3);
      --clr-arcade-glow: rgba(0, 229, 255, 0.1);
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: var(--clr-bg);
      font-family: var(--font-body);
      color: var(--clr-text);
      overflow: hidden;
      background: radial-gradient(circle at center, #0a0e1a 0%, #030008 100%);
    }

    /* Arcade Box Wrapper */
    .arcade-machine {
      position: relative;
      width: min(95vw, 1100px);
      padding: 24px;
      background: linear-gradient(180deg, #1a1f2c 0%, #0b0e14 100%);
      border: 4px solid #2a3142;
      border-radius: 12px;
      box-shadow: 
        0 0 0 2px #111,
        0 20px 50px rgba(0,0,0,0.8),
        inset 0 0 40px rgba(0,229,255,0.05);
    }

    .arcade-machine::before {
      content: '';
      position: absolute;
      top: -10px; left: 50%;
      transform: translateX(-50%);
      width: 200px; height: 4px;
      background: var(--clr-cerulean);
      box-shadow: 0 0 15px var(--clr-cerulean);
      border-radius: 2px;
    }

    .screen-container {
      position: relative;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 2px solid #000;
      box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
      display: flex;
      justify-content: center;
      align-items: center;
      aspect-ratio: 16 / 9;
    }

    /* CRT Scanline Overlay */
    .screen-container::after {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 2;
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      opacity: 0.3;
    }

    #game-root canvas {
      max-width: 100%;
      height: auto !important;
      display: block;
    }

    .arcade-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .arcade-title {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #fff;
      margin: 0;
      text-shadow: 0 0 10px rgba(0,229,255,0.5);
    }

    .arcade-controls {
      display: flex;
      gap: 12px;
    }

    .btn-arcade {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,229,255,0.3);
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
    }

    .btn-arcade:hover {
      background: rgba(0,229,255,0.1);
      border-color: var(--clr-cerulean);
      box-shadow: 0 0 10px rgba(0,229,255,0.2);
    }

    .arcade-footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .back-link {
      color: var(--clr-cerulean);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .arcade-machine {
        padding: 12px;
        border-width: 2px;
      }
      .arcade-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
    }
  </style>
</head>
<body>
  <div class="arcade-machine">
    <div class="arcade-header">
      <div class="brand-zone">
        <h1 class="arcade-title">Void Lancer</h1>
        <div style="font-size: 0.7rem; color: var(--clr-cerulean); opacity: 0.8;">SORTIE V1.0 // ANISIAN CONVERGENCE</div>
      </div>
      <div class="arcade-controls">
        <button class="btn-arcade" id="soundToggleBtn">Audio: On</button>
        <button class="btn-arcade" id="fullscreenBtn">Full Screen</button>
      </div>
    </div>

    <div class="screen-container">
      <div id="game-root"></div>
    </div>

    <div class="arcade-footer">
      <div>Controls: WASD/Arrows to Move • Space/J/K to Fire</div>
      <a href="/" class="back-link">← Return to Station</a>
    </div>
  </div>

  <!-- Scripts -->
  <script src="./js/phaser.min.js"></script>
  <script src="./js/level1_stage_data.js"></script>
  <script src="./js/main.js?v=2"></script>
  <script>
    // Handle Fullscreen via Phaser or DOM
    document.getElementById('fullscreenBtn').addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.querySelector('.arcade-machine').requestFullscreen();
      } else {
        document.exitFullscreen();
      }
    });
  </script>
</body>
</html>
