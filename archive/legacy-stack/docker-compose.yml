networks:
  lamp_network:
    driver: bridge
    internal: true
  public_network:
    driver: bridge

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

services:
  caddy:
    image: caddy:alpine
    container_name: mjw_www_caddy
    volumes:
      - ./websites:/var/www/sites:ro
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_config:/config
      - caddy_data:/data
    environment:
      - CADDY_INGRESS_PORTS=80
    networks:
      lamp_network:
        aliases:
          - caddy
          - web
          - apache #for legacy support
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f -H 'Host: mikewyantjr.com' http://localhost/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    container_name: mjw_www_nginx_proxy_manager
    restart: unless-stopped
    ports:
      - "${NPM_HTTP_PORT:-80}:${NPM_HTTP_PORT:-80}"
      - "${NPM_HTTPS_PORT:-443}:${NPM_HTTPS_PORT:-443}"
      - "${NPM_ADMIN_PORT:-81}:${NPM_ADMIN_PORT:-81}"
    volumes:
      - ./nginx/data:/data
      - ./nginx/letsencrypt:/etc/letsencrypt
      - ./nginx/custom_ssl:/config/ssl
      - ./nginx/backup:/backup
    environment:
      - "NPM_HTTP_PORT=${NPM_HTTP_PORT:-80}"
      - "NPM_HTTPS_PORT=${NPM_HTTPS_PORT:-443}"
      - "NPM_BACKUP_DIR=${NPM_BACKUP_DIR:-./backup}"
    depends_on:
      - caddy
    networks:
      lamp_network:
        aliases:
          - nginx-proxy-manager
      public_network:
        aliases:
          - nginx-proxy-manager

  netdata:
    image: netdata/netdata:stable
    container_name: mjw_netdata
    hostname: mjw-www-server
    ports:
      - "19999:19999"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_PARENT_COMMAND=DELETE
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_PTRACE
    networks:
      lamp_network:
        aliases:
          - netdata
    restart: unless-stopped
